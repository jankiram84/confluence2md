name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        # We use the underscore version to match your successful test environment
        run: pyinstaller --onefile --console --name "Confluence_Exporter" --clean confluence_md_exporter.py

      - name: Create Zip Archive
        # This step bundles the app with your instructions to fix the "Gatekeeper" error
        run: |
          mkdir confluence_exporter_macos
          cp dist/Confluence_Exporter confluence_exporter_macos/
          cp README.md confluence_exporter_macos/
          cp LICENSE confluence_exporter_macos/
          zip -r confluence_exporter_macos.zip confluence_exporter_macos/

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          # IMPORTANT: This must point to the .zip created in the previous step
          files: confluence_exporter_macos.zip
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: |
            ### 🚀 What's New
            * Fixed "Team ID" library mapping errors.
            * Added clean exit sequence to avoid red error text.
            * Bundled README and LICENSE for easier setup.
            
            **Note:** macOS users must go to **System Settings > Privacy & Security** and click **Open Anyway** after the first launch attempt.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
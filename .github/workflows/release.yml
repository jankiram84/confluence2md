name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v1.1.0, etc.

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        # Added ad-hoc signing flag
        run: pyinstaller --onefile --console --name "Confluence_Exporter" --codesign-identity - confluence-md-exporter.py

      - name: Archive Release
        # Zips the binary to help bypass aggressive Gatekeeper quarantine
        run: |
          cd dist
          zip Confluence_Exporter_macOS.zip Confluence_Exporter

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Confluence_Exporter_macOS.zip
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
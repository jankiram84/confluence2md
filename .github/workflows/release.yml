name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        # REMOVED --codesign-identity to prevent Team ID mismatch errors
        run: pyinstaller --onefile --console --name "Confluence_Exporter" --clean confluence_md_exporter.py
      
      - name: Archive Release
        # This creates a folder, copies the files, and zips them
        run: |
          mkdir confluence_exporter_macos
          cp dist/Confluence_Exporter confluence_exporter_macos/
          cp README.md confluence_exporter_macos/
          cp LICENSE confluence_exporter_macos/
          zip -r confluence_exporter_macos.zip confluence_exporter_macos/

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Confluence_Exporter
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: "Automated build for Confluence to Markdown Exporter. Note: macOS users may need to allow the app in System Settings > Privacy & Security."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}